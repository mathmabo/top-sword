<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fantasy RPG Village</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
}
canvas {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
}
#controls {
    color: #887755;
    margin-top: 10px;
    font-size: 13px;
    letter-spacing: 1px;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">WASD / Arrow Keys: Move &nbsp;&bull;&nbsp; Left Click: Attack &nbsp;&bull;&nbsp; Shift: Dash &nbsp;&bull;&nbsp; Space: Interact &nbsp;&bull;&nbsp; R: Restart</div>
<script>
// ============================================================
//  CONSTANTS
// ============================================================
const TILE    = 48;
const FW      = 48;                // character frame width
const FH      = 72;                // character frame height
const MAP_W   = 32;
const MAP_H   = 24;
const VIEW_W  = 800;
const VIEW_H  = 600;
const ANIM_FPS   = 8;
const WALK_SPEED = 2.5;
const ATK_DURATION = 0.25;          // attack active time
const ATK_COOLDOWN = 0.4;           // time between attacks
const ATK_RANGE    = 42;            // sword reach in px
const KNOCKBACK    = 550;           // knockback speed on hit
const HIT_FREEZE   = 0.07;          // brief freeze-frame on hit
const SWEEP_ANGLE  = Math.PI * 0.75;
const COMBO_WINDOW = 0.4;  // seconds to chain next hit
const COMBO_STEPS = [
    { dir: 1,  durMul: 1.0,  cdMul: 0.15, dmg: 1, knockMul: 1.0, arc: 0.75 },  // normal sweep
    { dir: -1, durMul: 0.85, cdMul: 0.15, dmg: 1, knockMul: 1.0, arc: 0.75 },  // reverse sweep
    { dir: 1,  durMul: 1.2,  cdMul: 1.0,  dmg: 2, knockMul: 1.5, arc: 1.0  },  // heavy finisher
];
const DIR_ANGLE = { down: Math.PI*0.5, up: -Math.PI*0.5, left: Math.PI, right: 0 };
const NPC_ATK_DURATION = 0.35;
const NPC_ATK_COOLDOWN = 1.2;
const NPC_ATK_RANGE    = 38;
const NPC_CHASE_SPEED  = 1.8;
const NPC_DEAGGRO_DIST = 10 * TILE;
const PLAYER_MAX_HP    = 5;
const NPC_MAX_HP       = 3;
const PROJ_SPEED_MAGIC = 170;
const PROJ_SPEED_ARROW = 260;
const RANGED_WINDUP    = 0.4;
const RANGED_FIRE_AT   = 0.15;        // fire when atkTimer falls to this
const ORB_DROP_CHANCE  = 0.4;         // 40% chance to drop a health orb
const ORB_HEAL         = 1;           // HP restored per orb
const ORB_LIFETIME     = 10;          // seconds before orb disappears
const ORB_RADIUS       = 8;           // pickup / draw radius
const RANGED_COOLDOWN  = 1.8;
const RANGED_DIST_MIN  = 3 * TILE;    // retreat if closer
const RANGED_DIST_IDEAL= 6 * TILE;    // approach if farther
const DASH_SPEED       = 9;
const DASH_DURATION    = 0.12;
const DASH_COOLDOWN    = 0.5;
const XP_BASE          = 3;
const XP_PER_LEVEL     = 2;

// Spritesheet row order (per character_tilesheet.md)
const DIR_ROW = { down: 0, left: 1, right: 2, up: 3 };
const DIR_DX  = { down: 0, left: -1, right: 1, up: 0 };
const DIR_DY  = { down: 1, left: 0, right: 0, up: -1 };

// ============================================================
//  CANVAS
// ============================================================
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
canvas.width  = VIEW_W;
canvas.height = VIEW_H;

// ============================================================
//  ASSET LOADING
// ============================================================
const images = {};
const assetList = {
    player:   '3x/NPCs/NPC 05_walk (48x72).png',
    // Enemies
    goblin:     '3x/Enemies/Wildlings/Goblin_walk.png',
    orc:        '3x/Enemies/Wildlings/Orc_walk.png',
    skeleton:   '3x/Enemies/Undead/Skeleton_walk.png',
    lich:       '3x/Enemies/Undead/Lich_walk.png',
    slime:      '3x/Enemies/Bog Dwellers/Slime_move.png',
    lizardfolk: '3x/Enemies/Bog Dwellers/Lizardfolk_walk.png',
    tree_m1:  '3x/Tileset/Tree_medium_1.png',
    tree_m2:  '3x/Tileset/Tree_medium_2.png',
    tree_s1:  '3x/Tileset/Tree_small_1.png',
    tree_s2:  '3x/Tileset/Tree_small_2.png',
    house1:   '3x/Tileset/House_1 (closed).png',
    house2:   '3x/Tileset/House_2 (closed).png',
    house3:   '3x/Tileset/House_3 (closed).png',
    bush:     '3x/Tileset/Bush.png',
    well1:    '3x/Tileset/Well_1.png',
    rock1:    '3x/Tileset/Rock_1.png',
    rock2:    '3x/Tileset/Rock_2.png',
    flower1:  '3x/Tileset/Flower_1.png',
    flower2:  '3x/Tileset/Flower_2.png',
    flower3:  '3x/Tileset/Flower_3.png',
    stone:    '3x/Tileset/Stone tile.png',
    tallgrass:'3x/Tileset/Tall grass.png',
};

function loadAssets() {
    return new Promise(resolve => {
        let n = Object.keys(assetList).length;
        for (const [key, src] of Object.entries(assetList)) {
            const img = new Image();
            img.onload = img.onerror = () => {
                images[key] = img;
                if (--n === 0) resolve();
            };
            img.src = src;
        }
    });
}

// ============================================================
//  COLLISION GRID
// ============================================================
const collision = Array.from({ length: MAP_H }, () => new Uint8Array(MAP_W));

function markBlocked(tx, ty, tw, th) {
    for (let y = ty; y < ty + th && y < MAP_H; y++)
        for (let x = tx; x < tx + tw && x < MAP_W; x++)
            if (y >= 0 && x >= 0) collision[y][x] = 1;
}

function blocked(px, py, w, h) {
    const corners = [
        [px, py], [px + w - 1, py],
        [px, py + h - 1], [px + w - 1, py + h - 1]
    ];
    for (const [cx, cy] of corners) {
        const tx = Math.floor(cx / TILE);
        const ty = Math.floor(cy / TILE);
        if (tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H) return true;
        if (collision[ty][tx]) return true;
    }
    return false;
}

// ============================================================
//  WORLD DEFINITION
// ============================================================
const groundDeco  = [];   // flowers, tall grass (walkable)
const worldObjs   = [];   // trees, houses, rocks, etc.
const pathTiles   = [];   // stone path positions

function buildWorld() {
    // ---- Stone paths (cross through village) ----
    for (let x = 3; x < MAP_W - 3; x++) {
        pathTiles.push({ x, y: 12 });
        pathTiles.push({ x, y: 13 });
    }
    for (let y = 3; y < MAP_H - 3; y++) {
        pathTiles.push({ x: 15, y });
        pathTiles.push({ x: 16, y });
    }
    // Paths to houses
    for (let y = 7; y < 12; y++) { pathTiles.push({ x: 7, y }); pathTiles.push({ x: 24, y }); }
    for (let y = 14; y < 19; y++) { pathTiles.push({ x: 7, y }); pathTiles.push({ x: 24, y }); }

    // ---- Houses (240x240 = 5x5 tiles, collision on lower 3 rows) ----
    worldObjs.push(
        { img: 'house1', x: 4,  y: 3,  pw: 240, ph: 240, cX: 0, cY: 2, cW: 5, cH: 3 },
        { img: 'house2', x: 22, y: 3,  pw: 240, ph: 240, cX: 0, cY: 2, cW: 5, cH: 3 },
        { img: 'house3', x: 4,  y: 16, pw: 240, ph: 240, cX: 0, cY: 2, cW: 5, cH: 3 },
        { img: 'house1', x: 22, y: 16, pw: 240, ph: 240, cX: 0, cY: 2, cW: 5, cH: 3 },
    );

    // ---- Well ----
    worldObjs.push(
        { img: 'well1', x: 14, y: 10, pw: 96, ph: 96, cX: 0, cY: 0, cW: 2, cH: 2 }
    );

    // ---- Trees around perimeter ----
    const treeImgs = ['tree_m1', 'tree_m2', 'tree_s1', 'tree_s2'];
    const pick = () => treeImgs[Math.floor(Math.random() * 4)];

    for (let x = 0; x < MAP_W; x += 2)
        worldObjs.push({ img: pick(), x, y: 0,  pw: 96, ph: 96, cX: 0, cY: 1, cW: 2, cH: 1 });
    for (let x = 0; x < MAP_W; x += 2)
        worldObjs.push({ img: pick(), x, y: MAP_H - 2, pw: 96, ph: 96, cX: 0, cY: 1, cW: 2, cH: 1 });
    for (let y = 2; y < MAP_H - 2; y += 2)
        worldObjs.push({ img: pick(), x: 0, y, pw: 96, ph: 96, cX: 0, cY: 1, cW: 2, cH: 1 });
    for (let y = 2; y < MAP_H - 2; y += 2)
        worldObjs.push({ img: pick(), x: MAP_W - 2, y, pw: 96, ph: 96, cX: 0, cY: 1, cW: 2, cH: 1 });

    // Scattered interior trees
    [[10,6],[20,6],[10,18],[20,18],[12,3],[18,3],[12,20],[18,20],[2,10],[28,10],[2,14],[28,14]]
        .forEach(([x, y]) => worldObjs.push({ img: pick(), x, y, pw: 96, ph: 96, cX: 0, cY: 1, cW: 2, cH: 1 }));

    // ---- Rocks ----
    [[3,10],[27,8],[13,6],[18,18],[26,14],[9,15],[21,5]]
        .forEach(([x, y]) => worldObjs.push({
            img: Math.random() > 0.5 ? 'rock1' : 'rock2',
            x, y, pw: 48, ph: 48, cX: 0, cY: 0, cW: 1, cH: 1
        }));

    // ---- Bushes ----
    [[3,7],[8,9],[27,11],[22,9],[11,14],[20,14],[3,15],[26,5],[9,19]]
        .forEach(([x, y]) => worldObjs.push({
            img: 'bush', x, y, pw: 48, ph: 48, cX: 0, cY: 0, cW: 1, cH: 1
        }));

    // ---- Flowers (walkable) ----
    const flowerImgs = ['flower1', 'flower2', 'flower3'];
    for (let i = 0; i < 30; i++) {
        const fx = 2 + Math.floor(Math.random() * (MAP_W - 4));
        const fy = 2 + Math.floor(Math.random() * (MAP_H - 4));
        groundDeco.push({ img: flowerImgs[i % 3], x: fx, y: fy });
    }

    // ---- Tall grass ----
    for (let i = 0; i < 18; i++) {
        const fx = 2 + Math.floor(Math.random() * (MAP_W - 4));
        const fy = 2 + Math.floor(Math.random() * (MAP_H - 4));
        groundDeco.push({ img: 'tallgrass', x: fx, y: fy });
    }

    // ---- Build collision from objects ----
    for (const o of worldObjs)
        markBlocked(o.x + (o.cX || 0), o.y + (o.cY || 0), o.cW, o.cH);
}

// ============================================================
//  CHARACTER
// ============================================================
class Character {
    constructor(spriteKey, tileX, tileY) {
        this.sprite = spriteKey;
        this.x = tileX * TILE;
        this.y = tileY * TILE;
        this.dir = 'down';
        this.frame = 0;
        this.animT = 0;
        this.moving = false;
        this.speed = WALK_SPEED;
    }

    update(dt) {
        if (this.moving) {
            this.animT += dt;
            if (this.animT >= 1 / ANIM_FPS) {
                this.animT -= 1 / ANIM_FPS;
                this.frame = (this.frame + 1) % 4;
            }
        } else {
            this.frame = 0;
            this.animT = 0;
        }
    }

    tryMove(dx, dy) {
        if (dx < 0) this.dir = 'left';
        else if (dx > 0) this.dir = 'right';
        if (dy < 0) this.dir = 'up';
        else if (dy > 0) this.dir = 'down';

        const nx = this.x + dx * this.speed;
        const ny = this.y + dy * this.speed;

        // Foot collision box (centered bottom)
        const bw = 20, bh = 14;
        const bx = nx + (FW - bw) / 2;
        const by = ny + FH - bh;

        if (!blocked(bx, by, bw, bh)) {
            this.x = nx;
            this.y = ny;
        }
        this.moving = true;
    }

    draw(cx, cy) {
        const img = images[this.sprite];
        if (!img) return;
        ctx.drawImage(
            img,
            this.frame * FW, DIR_ROW[this.dir] * FH, FW, FH,
            Math.round(this.x - cx), Math.round(this.y - cy), FW, FH
        );
    }

    get sortY() { return this.y + FH; }
}

// ============================================================
//  NPC (wandering AI)
// ============================================================
class NPC extends Character {
    constructor(spriteKey, tileX, tileY, dialogue) {
        super(spriteKey, tileX, tileY);
        this.dialogue = dialogue;
        this.speed = 1.0;
        this.wTimer = 2 + Math.random() * 3;
        this.wDir = null;
        this.homeX = tileX * TILE;
        this.homeY = tileY * TILE;
        this.wRadius = 3 * TILE;
        // Combat
        this.maxHp = NPC_MAX_HP;
        this.hp = NPC_MAX_HP;
        this.hitTimer = 0;
        this.hitInvuln = 0;
        this.knockVx = 0;
        this.knockVy = 0;
        this.aggro = false;
        this.atkTimer = 0;
        this.atkCooldown = 0;
        this.atkHit = false;
        this.alive = true;
        this.respawnTimer = 0;
        // Hostile enemies auto-aggro when player is nearby
        this.hostile = false;
        this.aggroRange = 5 * TILE;
        // Ranged
        this.ranged = false;
        this.projType = 'magic';
        this.rangedCooldown = 0;
        this.fireQueued = false;
    }

    faceToward(target) {
        const ddx = target.x - this.x;
        const ddy = target.y - this.y;
        if (Math.abs(ddx) > Math.abs(ddy))
            this.dir = ddx < 0 ? 'left' : 'right';
        else
            this.dir = ddy < 0 ? 'up' : 'down';
    }

    update(dt, player) {
        // Respawn
        if (!this.alive) {
            this.respawnTimer -= dt;
            if (this.respawnTimer <= 0) {
                this.alive = true;
                this.hp = this.maxHp;
                this.x = this.homeX;
                this.y = this.homeY;
                this.aggro = false;
                this.moving = false;
                this.atkTimer = 0;
                this.atkCooldown = 0;
                spawnParticles(this.x + FW / 2, this.y + FH / 2, '#88ff88', 10);
            }
            return;
        }

        // Hit timers
        if (this.hitTimer > 0) this.hitTimer -= dt;
        if (this.hitInvuln > 0) this.hitInvuln -= dt;
        if (this.atkCooldown > 0) this.atkCooldown -= dt;

        // Death
        if (this.hp <= 0) {
            this.alive = false;
            this.respawnTimer = 8;
            this.aggro = false;
            spawnParticles(this.x + FW / 2, this.y + FH / 2, '#ff6644', 15);
            spawnParticles(this.x + FW / 2, this.y + FH / 2, '#ffcc00', 10);
            spawnHealthOrb(this.x + FW / 2, this.y + FH / 2);
            return;
        }

        // Knockback physics
        if (Math.abs(this.knockVx) > 1 || Math.abs(this.knockVy) > 1) {
            const bw = 20, bh = 14;
            const nx = this.x + this.knockVx * dt;
            const ny = this.y + this.knockVy * dt;
            if (!blocked(nx + (FW - bw) / 2, ny + FH - bh, bw, bh)) {
                this.x = nx;
                this.y = ny;
            } else {
                // Bounce off walls slightly
                this.knockVx *= -0.3;
                this.knockVy *= -0.3;
            }
            this.knockVx *= 0.91;
            this.knockVy *= 0.91;
            this.moving = false;
            super.update(dt);
            return;
        }

        const distP = Math.hypot(player.x - this.x, player.y - this.y);

        // Auto-aggro for hostile enemies
        if (this.hostile && !this.aggro && distP < this.aggroRange) {
            this.aggro = true;
        }

        // ---- Aggro behavior ----
        if (this.aggro) {
            // De-aggro if player is far away
            if (distP > NPC_DEAGGRO_DIST) {
                this.aggro = false;
                this.wTimer = 1;
                this.moving = false;
                super.update(dt);
                return;
            }

            // ---- Ranged AI ----
            if (this.ranged) {
                this.faceToward(player);
                if (this.rangedCooldown > 0) this.rangedCooldown -= dt;

                if (distP < RANGED_DIST_MIN) {
                    // Too close - retreat
                    const away = Math.atan2(this.y - player.y, this.x - player.x);
                    const prev = this.speed;
                    this.speed = NPC_CHASE_SPEED;
                    this.tryMove(Math.cos(away), Math.sin(away));
                    this.speed = prev;
                } else if (distP > RANGED_DIST_IDEAL) {
                    // Too far - approach
                    const a = Math.atan2(player.y - this.y, player.x - this.x);
                    const prev = this.speed;
                    this.speed = NPC_CHASE_SPEED * 0.7;
                    this.tryMove(Math.cos(a), Math.sin(a));
                    this.speed = prev;
                } else {
                    // In range - fire
                    this.moving = false;
                    if (this.rangedCooldown <= 0 && this.atkTimer <= 0) {
                        this.atkTimer = RANGED_WINDUP;
                        this.fireQueued = true;
                    }
                }

                if (this.atkTimer > 0) {
                    this.atkTimer -= dt;
                    this.moving = false;
                    if (this.atkTimer <= RANGED_FIRE_AT && this.fireQueued) {
                        this.fireQueued = false;
                        this.rangedCooldown = RANGED_COOLDOWN;
                        fireProjectile(this, player.x + FW / 2, player.y + FH / 2, this.projType);
                    }
                }
                super.update(dt);
                return;
            }

            // ---- Melee AI ----
            if (distP < TILE * 1.5 && this.atkCooldown <= 0 && this.atkTimer <= 0) {
                this.faceToward(player);
                this.atkTimer = NPC_ATK_DURATION;
                this.atkCooldown = NPC_ATK_COOLDOWN;
                this.atkHit = false;
                this.moving = false;
            }
            else if (this.atkTimer <= 0) {
                const a = Math.atan2(player.y - this.y, player.x - this.x);
                const prevSpd = this.speed;
                this.speed = NPC_CHASE_SPEED;
                this.tryMove(Math.cos(a), Math.sin(a));
                this.speed = prevSpd;
            } else {
                this.moving = false;
            }

            if (this.atkTimer > 0) this.atkTimer -= dt;
            super.update(dt);
            return;
        }

        // ---- Peaceful wander ----
        this.wTimer -= dt;
        if (this.wTimer <= 0) {
            if (!this.wDir) {
                this.wDir = ['up', 'down', 'left', 'right'][Math.floor(Math.random() * 4)];
                this.wTimer = 0.5 + Math.random() * 1.5;
            } else {
                this.wDir = null;
                this.wTimer = 1.5 + Math.random() * 3;
                this.moving = false;
            }
        }
        if (this.wDir) {
            const dx = DIR_DX[this.wDir], dy = DIR_DY[this.wDir];
            const nx = this.x + dx * this.speed;
            const ny = this.y + dy * this.speed;
            if (Math.hypot(nx - this.homeX, ny - this.homeY) < this.wRadius) {
                this.tryMove(dx, dy);
            } else {
                this.wDir = null;
                this.wTimer = 1;
                this.moving = false;
            }
        }
        super.update(dt);
    }

    draw(cx, cy) {
        if (!this.alive) return;
        if (this.hitInvuln > 0 && Math.floor(this.hitInvuln * 20) % 2 === 0) return;
        super.draw(cx, cy);
    }
}

// ============================================================
//  AUDIO
// ============================================================
let audioCtx;
function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
}

function playHealSound() {
    const ac = getAudioCtx();
    const now = ac.currentTime;

    // Two-tone ascending chime
    [523.25, 659.25].forEach((freq, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, now + i * 0.08);
        gain.gain.linearRampToValueAtTime(0.18, now + i * 0.08 + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);
        osc.connect(gain).connect(ac.destination);
        osc.start(now + i * 0.08);
        osc.stop(now + i * 0.08 + 0.3);
    });
}

function playLevelUpSound() {
    const ac = getAudioCtx();
    const now = ac.currentTime;
    // Three-note ascending fanfare C5->E5->G5
    [523.25, 659.25, 783.99].forEach((freq, i) => {
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = 'triangle';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0, now + i * 0.1);
        gain.gain.linearRampToValueAtTime(0.22, now + i * 0.1 + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.4);
        osc.connect(gain).connect(ac.destination);
        osc.start(now + i * 0.1);
        osc.stop(now + i * 0.1 + 0.4);
    });
    // Shimmering G6 sustain
    const osc2 = ac.createOscillator();
    const gain2 = ac.createGain();
    osc2.type = 'sine';
    osc2.frequency.value = 1567.98;
    gain2.gain.setValueAtTime(0, now + 0.15);
    gain2.gain.linearRampToValueAtTime(0.1, now + 0.25);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
    osc2.connect(gain2).connect(ac.destination);
    osc2.start(now + 0.15);
    osc2.stop(now + 0.8);
}

// ============================================================
//  INPUT
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','ShiftLeft','ShiftRight'].includes(e.code))
        e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('mousedown', e => { if (e.button === 0) keys['Mouse0'] = true; });
window.addEventListener('mouseup', e => { if (e.button === 0) keys['Mouse0'] = false; });

let mouseX = 0, mouseY = 0;
let mouseClicked = false;
canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (VIEW_W / rect.width);
    mouseY = (e.clientY - rect.top) * (VIEW_H / rect.height);
});
canvas.addEventListener('click', () => { mouseClicked = true; });

// ============================================================
//  CAMERA
// ============================================================
const cam = { x: 0, y: 0 };

function updateCam(target) {
    const tx = target.x + FW / 2 - VIEW_W / 2;
    const ty = target.y + FH / 2 - VIEW_H / 2;
    cam.x += (tx - cam.x) * 0.08;
    cam.y += (ty - cam.y) * 0.08;
    cam.x = Math.max(0, Math.min(cam.x, MAP_W * TILE - VIEW_W));
    cam.y = Math.max(0, Math.min(cam.y, MAP_H * TILE - VIEW_H));
}

// ============================================================
//  DIALOGUE
// ============================================================
let dlgText = '';
let dlgTimer = 0;

function showDlg(text) { dlgText = text; dlgTimer = 3; }

function drawDlg() {
    if (dlgTimer <= 0) return;

    ctx.font = '16px "Courier New", monospace';
    const tw = ctx.measureText(dlgText).width;
    const pad = 20;
    const w = tw + pad * 2;
    const h = 48;
    const x = (VIEW_W - w) / 2;
    const y = VIEW_H - h - 24;

    // Box
    ctx.fillStyle = 'rgba(20, 12, 8, 0.9)';
    ctx.strokeStyle = '#c8a86e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 6);
    ctx.fill();
    ctx.stroke();

    // Text
    ctx.fillStyle = '#f0e6d0';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(dlgText, VIEW_W / 2, y + h / 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

// ============================================================
//  RENDERING
// ============================================================
const GRASS_A = '#5a8a2f';
const GRASS_B = '#4f7d28';

function renderGround() {
    ctx.fillStyle = GRASS_A;
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    const sx = Math.floor(cam.x / TILE);
    const sy = Math.floor(cam.y / TILE);
    const ex = Math.min(MAP_W, sx + Math.ceil(VIEW_W / TILE) + 2);
    const ey = Math.min(MAP_H, sy + Math.ceil(VIEW_H / TILE) + 2);

    // Subtle checkerboard grass
    ctx.fillStyle = GRASS_B;
    for (let ty = sy; ty < ey; ty++)
        for (let tx = sx; tx < ex; tx++)
            if ((tx + ty) % 2 === 0)
                ctx.fillRect(
                    Math.round(tx * TILE - cam.x),
                    Math.round(ty * TILE - cam.y),
                    TILE, TILE
                );

    // Stone paths
    if (images.stone) {
        for (const p of pathTiles) {
            const px = Math.round(p.x * TILE - cam.x);
            const py = Math.round(p.y * TILE - cam.y);
            if (px > -TILE && px < VIEW_W && py > -TILE && py < VIEW_H)
                ctx.drawImage(images.stone, px, py);
        }
    }

    // Ground decorations
    for (const d of groundDeco) {
        const img = images[d.img];
        if (!img) continue;
        const px = Math.round(d.x * TILE - cam.x);
        const py = Math.round(d.y * TILE - cam.y);
        if (px > -TILE && px < VIEW_W && py > -TILE && py < VIEW_H)
            ctx.drawImage(img, px, py);
    }
}

function renderScene(player, npcs) {
    const list = [];

    // World objects
    for (const o of worldObjs) {
        const img = images[o.img];
        if (!img) continue;
        const px = Math.round(o.x * TILE - cam.x);
        const py = Math.round(o.y * TILE - cam.y);
        if (px > -o.pw && px < VIEW_W && py > -o.ph && py < VIEW_H)
            list.push({
                sortY: (o.y * TILE) + o.ph,
                draw() { ctx.drawImage(img, px, py); }
            });
    }

    // Player (with hit flicker)
    list.push({ sortY: player.sortY, draw() {
        if (player.hitInvuln > 0 && Math.floor(player.hitInvuln * 20) % 2 === 0) return;
        player.draw(cam.x, cam.y);
    } });
    for (const npc of npcs)
        list.push({ sortY: npc.sortY, draw() { npc.draw(cam.x, cam.y); } });

    list.sort((a, b) => a.sortY - b.sortY);
    for (const item of list) item.draw();
}

// Shadow under characters
function drawShadow(char) {
    const sx = Math.round(char.x + FW / 2 - cam.x);
    const sy = Math.round(char.y + FH - 6 - cam.y);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();
}

// ============================================================
//  PARTICLES
// ============================================================
const particles = [];

function spawnParticles(wx, wy, color, count) {
    for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 50 + Math.random() * 100;
        const life = 0.2 + Math.random() * 0.3;
        particles.push({
            x: wx, y: wy,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life, maxLife: life,
            size: 2 + Math.random() * 3, color
        });
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vy += 120 * dt; // gravity
        p.life -= dt;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        const sz = p.size * (p.life / p.maxLife);
        ctx.fillRect(
            Math.round(p.x - cam.x - sz / 2),
            Math.round(p.y - cam.y - sz / 2),
            sz, sz
        );
    }
    ctx.globalAlpha = 1;
}

// ============================================================
//  HEALTH ORBS
// ============================================================
const healthOrbs = [];

function spawnHealthOrb(wx, wy) {
    if (Math.random() > ORB_DROP_CHANCE) return;
    healthOrbs.push({
        x: wx, y: wy,
        life: ORB_LIFETIME,
        bobPhase: Math.random() * Math.PI * 2
    });
}

function updateHealthOrbs(dt, player) {
    for (let i = healthOrbs.length - 1; i >= 0; i--) {
        const orb = healthOrbs[i];
        orb.life -= dt;
        orb.bobPhase += dt * 3;
        if (orb.life <= 0) { healthOrbs.splice(i, 1); continue; }

        // Pickup check
        const dx = (player.x + FW / 2) - orb.x;
        const dy = (player.y + FH / 2) - orb.y;
        if (Math.hypot(dx, dy) < TILE * 0.8) {
            if (player.hp < player.stats.maxHp) {
                player.hp = Math.min(player.hp + ORB_HEAL + player.stats.orbHealBonus, player.stats.maxHp);
                spawnParticles(orb.x, orb.y, '#44ff66', 10);
                spawnParticles(orb.x, orb.y, '#ffffff', 5);
                playHealSound();
                healthOrbs.splice(i, 1);
            }
        }
    }
}

function drawHealthOrbs() {
    for (const orb of healthOrbs) {
        const sx = Math.round(orb.x - cam.x);
        const sy = Math.round(orb.y - cam.y + Math.sin(orb.bobPhase) * 4);
        const fade = orb.life < 2 ? orb.life / 2 : 1;

        // Outer glow
        ctx.globalAlpha = 0.25 * fade;
        ctx.fillStyle = '#44ff66';
        ctx.beginPath();
        ctx.arc(sx, sy, ORB_RADIUS * 2, 0, Math.PI * 2);
        ctx.fill();

        // Core orb
        ctx.globalAlpha = 0.9 * fade;
        const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, ORB_RADIUS);
        grad.addColorStop(0, '#ffffff');
        grad.addColorStop(0.4, '#66ff88');
        grad.addColorStop(1, '#22aa44');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(sx, sy, ORB_RADIUS, 0, Math.PI * 2);
        ctx.fill();

        // Highlight
        ctx.globalAlpha = 0.7 * fade;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(sx - 2, sy - 2, 3, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = 1;
    }
}

// ============================================================
//  SCREEN SHAKE
// ============================================================
let shakeTimer = 0;
let shakeIntensity = 0;
let freezeTimer = 0;

// ============================================================
//  SWORD SLASH EFFECT
// ============================================================
const SLASH_COLORS = [
    { outer: [255,220,80],  main: [255,250,220], inner: [255,255,255] },  // gold
    { outer: [140,200,255], main: [200,230,255], inner: [255,255,255] },  // ice-blue
    { outer: [255,120,40],  main: [255,180,80],  inner: [255,255,200] },  // fire-orange
];

function drawSwordSlash(player) {
    if (!player.atkTimer || player.atkTimer <= 0) return;

    const step = COMBO_STEPS[player.comboStep];
    const stepDur = player.stats.atkDuration * step.durMul;
    const progress = 1 - (player.atkTimer / stepDur);
    const cx = Math.round(player.x + FW / 2 - cam.x);
    const cy = Math.round(player.y + FH * 0.45 - cam.y);
    const base = DIR_ANGLE[player.dir];
    const sweepArc = SWEEP_ANGLE * (step.arc / 0.75);
    const start = base + (step.dir === -1 ? sweepArc / 2 : -sweepArc / 2);
    const current = start + step.dir * progress * sweepArc;
    const fade = 1 - progress;
    const range = player.stats.atkRange;
    const col = SLASH_COLORS[player.comboStep];

    ctx.save();

    // Outer glow arc
    ctx.strokeStyle = `rgba(${col.outer[0]}, ${col.outer[1]}, ${col.outer[2]}, ${0.25 * fade})`;
    ctx.lineWidth = player.comboStep === 2 ? 18 : 14;
    ctx.beginPath();
    ctx.arc(cx, cy, range, Math.min(start, current), Math.max(start, current));
    ctx.stroke();

    // Main slash arc
    ctx.strokeStyle = `rgba(${col.main[0]}, ${col.main[1]}, ${col.main[2]}, ${0.7 * fade})`;
    ctx.lineWidth = player.comboStep === 2 ? 5 : 4;
    ctx.beginPath();
    ctx.arc(cx, cy, range, Math.min(start, current), Math.max(start, current));
    ctx.stroke();

    // Inner bright arc (thinner, brighter)
    ctx.strokeStyle = `rgba(${col.inner[0]}, ${col.inner[1]}, ${col.inner[2]}, ${0.9 * fade})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, range - 3, current - step.dir * 0.3, current);
    ctx.stroke();

    // Sword blade
    const bladeEnd = range + 6;
    const ex = cx + Math.cos(current) * bladeEnd;
    const ey = cy + Math.sin(current) * bladeEnd;
    const hx = cx + Math.cos(current) * 12;
    const hy = cy + Math.sin(current) * 12;

    // Blade shadow
    ctx.strokeStyle = `rgba(80, 60, 40, ${0.6 * fade})`;
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    // Blade
    ctx.strokeStyle = `rgba(220, 215, 200, ${fade})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.lineTo(ex, ey);
    ctx.stroke();

    // Blade edge highlight
    const perpX = -Math.sin(current);
    const perpY = Math.cos(current);
    ctx.strokeStyle = `rgba(255, 255, 255, ${0.8 * fade})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(hx + perpX, hy + perpY);
    ctx.lineTo(ex + perpX * 0.5, ey + perpY * 0.5);
    ctx.stroke();

    // Tip sparkle
    ctx.fillStyle = `rgba(${col.inner[0]}, ${col.inner[1]}, ${col.inner[2]}, ${fade})`;
    ctx.beginPath();
    ctx.arc(ex, ey, player.comboStep === 2 ? 5 * fade : 3 * fade, 0, Math.PI * 2);
    ctx.fill();

    // Finisher: extra tip sparks
    if (player.comboStep === 2 && progress > 0.2 && progress < 0.8) {
        for (let i = 0; i < 3; i++) {
            const sparkOff = (Math.random() - 0.5) * 10;
            const sx = ex + sparkOff;
            const sy = ey + (Math.random() - 0.5) * 10;
            ctx.fillStyle = `rgba(255, ${100 + Math.random() * 80 | 0}, 40, ${0.8 * fade})`;
            ctx.beginPath();
            ctx.arc(sx, sy, 1.5 + Math.random() * 2, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.restore();
}

// ============================================================
//  PROJECTILE SYSTEM
// ============================================================
const projectiles = [];

function fireProjectile(npc, targetX, targetY, type) {
    const sx = npc.x + FW / 2;
    const sy = npc.y + FH * 0.4;
    const angle = Math.atan2(targetY - sy, targetX - sx);
    const speed = type === 'magic' ? PROJ_SPEED_MAGIC : PROJ_SPEED_ARROW;
    projectiles.push({
        x: sx, y: sy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 3.5,
        type,
        radius: type === 'magic' ? 7 : 4,
        deflected: false,
        trail: []
    });
    spawnParticles(sx, sy, type === 'magic' ? '#aa44ff' : '#cc8833', 6);
}

function updateProjectiles(dt, player, npcs, onNpcKill) {
    let killedPlayer = false;
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.trail.push({ x: p.x, y: p.y });
        if (p.trail.length > 6) p.trail.shift();

        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;

        if (p.life <= 0 || p.x < -TILE || p.x > (MAP_W+1)*TILE || p.y < -TILE || p.y > (MAP_H+1)*TILE) {
            projectiles.splice(i, 1);
            continue;
        }

        // --- Deflect by player sword ---
        if (!p.deflected && player.atkTimer > 0) {
            const pcx = player.x + FW / 2;
            const pcy = player.y + FH * 0.45;
            if (Math.hypot(p.x - pcx, p.y - pcy) < player.stats.atkRange + p.radius + 4) {
                const a = Math.atan2(p.y - pcy, p.x - pcx);
                const spd = Math.hypot(p.vx, p.vy) * 1.6;
                p.vx = Math.cos(a) * spd;
                p.vy = Math.sin(a) * spd;
                p.deflected = true;
                p.life = 3.0;
                spawnParticles(p.x, p.y, '#ffffff', 8);
                spawnParticles(p.x, p.y, '#ffee44', 4);
                shakeTimer = 0.06;
                shakeIntensity = 2;
                continue;
            }
        }

        // --- Hit player ---
        if (!p.deflected && player.hitInvuln <= 0 && !player.dashing) {
            const dx = p.x - (player.x + FW / 2);
            const dy = p.y - (player.y + FH / 2);
            if (Math.hypot(dx, dy) < p.radius + 14) {
                player.hp--;
                player.hitInvuln = 1.0;
                const pa = Math.atan2(p.vy, p.vx);
                player.knockVx = Math.cos(pa) * KNOCKBACK * 0.6;
                player.knockVy = Math.sin(pa) * KNOCKBACK * 0.6;
                spawnParticles(p.x, p.y, p.type === 'magic' ? '#bb66ff' : '#ff8844', 10);
                spawnParticles(p.x, p.y, '#ffffff', 4);
                shakeTimer = 0.14;
                shakeIntensity = 5;
                freezeTimer = HIT_FREEZE;
                projectiles.splice(i, 1);
                if (player.hp <= 0) killedPlayer = true;
                continue;
            }
        }

        // --- Deflected projectiles hit NPCs ---
        if (p.deflected) {
            let hit = false;
            for (const npc of npcs) {
                if (!npc.alive || npc.hitInvuln > 0) continue;
                const ncx = npc.x + FW / 2;
                const ncy = npc.y + FH / 2;
                if (Math.hypot(p.x - ncx, p.y - ncy) < p.radius + 18) {
                    npc.hp--;
                    if (npc.hp <= 0 && onNpcKill) onNpcKill(npc);
                    npc.hitTimer = 0.3;
                    npc.hitInvuln = 0.8;
                    npc.aggro = true;
                    const pa = Math.atan2(p.vy, p.vx);
                    npc.knockVx = Math.cos(pa) * KNOCKBACK * 0.7;
                    npc.knockVy = Math.sin(pa) * KNOCKBACK * 0.7;
                    spawnParticles(ncx, ncy, '#ffdd44', 10);
                    spawnParticles(ncx, ncy, '#ffffff', 5);
                    shakeTimer = 0.12;
                    shakeIntensity = 4;
                    freezeTimer = HIT_FREEZE;
                    projectiles.splice(i, 1);
                    hit = true;
                    break;
                }
            }
            if (hit) continue;
        }
    }
    return killedPlayer;
}

function drawProjectiles() {
    for (const p of projectiles) {
        const sx = Math.round(p.x - cam.x);
        const sy = Math.round(p.y - cam.y);

        // Trail
        for (let t = 0; t < p.trail.length; t++) {
            const alpha = (t + 1) / p.trail.length * 0.35;
            const sz = p.radius * ((t + 1) / p.trail.length);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = p.deflected ? '#ffee88' : (p.type === 'magic' ? '#9944ff' : '#aa7744');
            const tx = Math.round(p.trail[t].x - cam.x);
            const ty = Math.round(p.trail[t].y - cam.y);
            ctx.beginPath();
            ctx.arc(tx, ty, sz, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;

        if (p.type === 'magic') {
            // Outer glow
            ctx.fillStyle = p.deflected ? 'rgba(255,220,100,0.2)' : 'rgba(140,70,255,0.2)';
            ctx.beginPath(); ctx.arc(sx, sy, p.radius + 6, 0, Math.PI * 2); ctx.fill();
            // Core
            ctx.fillStyle = p.deflected ? '#ffee88' : '#bb66ff';
            ctx.beginPath(); ctx.arc(sx, sy, p.radius, 0, Math.PI * 2); ctx.fill();
            // Center
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(sx, sy, p.radius * 0.35, 0, Math.PI * 2); ctx.fill();
        } else {
            // Arrow shaft
            const a = Math.atan2(p.vy, p.vx);
            const len = 12;
            const tipX = sx + Math.cos(a) * len, tipY = sy + Math.sin(a) * len;
            const tailX = sx - Math.cos(a) * len, tailY = sy - Math.sin(a) * len;
            ctx.strokeStyle = p.deflected ? '#ffdd44' : '#7B3F00';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(tailX, tailY); ctx.lineTo(tipX, tipY); ctx.stroke();
            // Arrowhead
            ctx.fillStyle = p.deflected ? '#fff' : '#bbb';
            ctx.beginPath();
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(tipX - Math.cos(a - 0.5) * 7, tipY - Math.sin(a - 0.5) * 7);
            ctx.lineTo(tipX - Math.cos(a + 0.5) * 7, tipY - Math.sin(a + 0.5) * 7);
            ctx.closePath(); ctx.fill();
            // Fletching
            ctx.strokeStyle = p.deflected ? '#ffcc44' : '#996633';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(tailX, tailY);
            ctx.lineTo(tailX - Math.cos(a - 0.6) * 5, tailY - Math.sin(a - 0.6) * 5);
            ctx.moveTo(tailX, tailY);
            ctx.lineTo(tailX - Math.cos(a + 0.6) * 5, tailY - Math.sin(a + 0.6) * 5);
            ctx.stroke();
        }
    }
}

// ============================================================
//  NPC CHARGE-UP VISUAL (ranged wind-up)
// ============================================================
function drawNpcCharge(npc) {
    if (!npc.alive || !npc.ranged || !npc.aggro || npc.atkTimer <= 0) return;
    const progress = 1 - (npc.atkTimer / RANGED_WINDUP);
    const cx = Math.round(npc.x + FW / 2 - cam.x);
    const cy = Math.round(npc.y + FH * 0.3 - cam.y);
    const r = progress * 11;

    // Glow
    const isMagic = npc.projType === 'magic';
    ctx.fillStyle = isMagic ? `rgba(140,70,255,${0.3*progress})` : `rgba(200,150,50,${0.3*progress})`;
    ctx.beginPath(); ctx.arc(cx, cy, r + 5, 0, Math.PI * 2); ctx.fill();
    // Core
    ctx.fillStyle = isMagic ? '#bb66ff' : '#ffaa44';
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2); ctx.fill();
    // Bright center
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.25, 0, Math.PI * 2); ctx.fill();

    // Orbiting sparkles
    const t = performance.now() / 200;
    for (let k = 0; k < 3; k++) {
        const a = t + k * Math.PI * 2 / 3;
        const ox = cx + Math.cos(a) * (r + 3);
        const oy = cy + Math.sin(a) * (r + 3);
        ctx.fillStyle = isMagic ? '#ddaaff' : '#ffcc66';
        ctx.beginPath(); ctx.arc(ox, oy, 2, 0, Math.PI * 2); ctx.fill();
    }
}

// ============================================================
//  NPC SLASH EFFECT (red-tinted, melee only)
// ============================================================
function drawNpcSlash(npc) {
    if (!npc.alive || !npc.aggro || npc.atkTimer <= 0 || npc.ranged) return;

    const progress = 1 - (npc.atkTimer / NPC_ATK_DURATION);
    const cx = Math.round(npc.x + FW / 2 - cam.x);
    const cy = Math.round(npc.y + FH * 0.45 - cam.y);
    const base = DIR_ANGLE[npc.dir];
    const start = base - SWEEP_ANGLE / 2;
    const current = start + progress * SWEEP_ANGLE;
    const fade = 1 - progress;

    ctx.save();
    ctx.strokeStyle = `rgba(255, 80, 60, ${0.3 * fade})`;
    ctx.lineWidth = 12;
    ctx.beginPath();
    ctx.arc(cx, cy, NPC_ATK_RANGE, start, current);
    ctx.stroke();

    ctx.strokeStyle = `rgba(255, 120, 80, ${0.7 * fade})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, NPC_ATK_RANGE, start, current);
    ctx.stroke();

    ctx.strokeStyle = `rgba(255, 200, 160, ${0.9 * fade})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, NPC_ATK_RANGE - 3, current - 0.3, current);
    ctx.stroke();

    // Blade
    const bladeEnd = NPC_ATK_RANGE + 5;
    const ex = cx + Math.cos(current) * bladeEnd;
    const ey = cy + Math.sin(current) * bladeEnd;
    const hx = cx + Math.cos(current) * 12;
    const hy = cy + Math.sin(current) * 12;
    ctx.strokeStyle = `rgba(180, 60, 40, ${0.6 * fade})`;
    ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.strokeStyle = `rgba(255, 180, 150, ${fade})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(ex, ey); ctx.stroke();
    ctx.restore();
}

// ============================================================
//  AGGRO INDICATOR + NPC HP BAR
// ============================================================
function drawAggroMark(npc) {
    if (!npc.alive || !npc.aggro) return;
    const sx = Math.round(npc.x + FW / 2 - cam.x);
    const sy = Math.round(npc.y - 20 - cam.y);

    // Red "!" above health bar
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3333';
    ctx.fillText('!', sx, sy);
    ctx.textAlign = 'left';
}

function drawNpcHpBar(npc) {
    if (!npc.alive || !npc.aggro) return;
    const maxHp = npc.maxHp;
    const cx = Math.round(npc.x + FW / 2 - cam.x);
    const sy = Math.round(npc.y - 8 - cam.y);
    const w = 36, h = 5;
    const sx = cx - w / 2;
    const ratio = Math.max(0, npc.hp / maxHp);

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath();
    ctx.roundRect(sx - 1, sy - 1, w + 2, h + 2, 2);
    ctx.fill();

    // Bar fill
    const barColor = ratio > 0.5 ? '#44cc44' : ratio > 0.25 ? '#ddaa22' : '#dd3333';
    if (ratio > 0) {
        ctx.fillStyle = barColor;
        ctx.beginPath();
        ctx.roundRect(sx, sy, w * ratio, h, 1);
        ctx.fill();
    }

    // Highlight on top edge
    ctx.fillStyle = `rgba(255,255,255,0.2)`;
    ctx.fillRect(sx, sy, w * ratio, 1);

    // Border
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(sx - 1, sy - 1, w + 2, h + 2, 2);
    ctx.stroke();
}

// ============================================================
//  AFTERIMAGES (dash trail)
// ============================================================
function drawAfterimages(player) {
    const img = images[player.sprite];
    if (!img) return;
    for (const ai of player.afterimages) {
        ctx.save();
        ctx.globalAlpha = ai.alpha * 0.5;
        ctx.filter = 'brightness(1.4) saturate(0.3)';
        ctx.drawImage(
            img,
            ai.frame * FW, DIR_ROW[ai.dir] * FH, FW, FH,
            Math.round(ai.x - cam.x), Math.round(ai.y - cam.y), FW, FH
        );
        ctx.restore();
    }
}

// ============================================================
//  GAME OVER SCREEN
// ============================================================
function drawGameOver() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = '#cc3333';
    ctx.font = 'bold 36px "Courier New", monospace';
    ctx.fillText('DEFEATED', VIEW_W / 2, VIEW_H / 2 - 30);

    ctx.fillStyle = '#c8a86e';
    ctx.font = '16px "Courier New", monospace';
    ctx.fillText('Press R to try again', VIEW_W / 2, VIEW_H / 2 + 20);

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

// ============================================================
//  HUD
// ============================================================
function drawHUD(p) {
    ctx.fillStyle = 'rgba(20, 12, 8, 0.7)';
    ctx.beginPath();
    ctx.roundRect(10, 10, 210, 32, 4);
    ctx.fill();
    ctx.strokeStyle = '#c8a86e';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.fillStyle = '#c8a86e';
    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.fillText('Fantasy RPG Village', 22, 31);

    // HP hearts
    const hx = 12, hy = 48;
    ctx.font = '18px serif';
    for (let i = 0; i < p.stats.maxHp; i++) {
        ctx.fillStyle = i < p.hp ? '#ee3344' : '#442222';
        ctx.fillText('\u2665', hx + i * 22, hy + 16);
    }

    // Dash cooldown indicator
    const dashX = 12, dashY = 74;
    ctx.font = 'bold 12px "Courier New", monospace';
    if (p.dashing) {
        ctx.fillStyle = '#88ccff';
        ctx.fillText('DASH', dashX, dashY);
    } else if (p.dashCooldown > 0) {
        ctx.fillStyle = '#555555';
        ctx.fillText('DASH', dashX, dashY);
        // Cooldown bar
        const barW = 40, barH = 4;
        const fill = 1 - (p.dashCooldown / p.stats.dashCooldown);
        ctx.fillStyle = '#333333';
        ctx.fillRect(dashX + 46, dashY - 8, barW, barH);
        ctx.fillStyle = '#6688aa';
        ctx.fillRect(dashX + 46, dashY - 8, barW * fill, barH);
    } else {
        ctx.fillStyle = '#88ccff';
        ctx.fillText('DASH', dashX, dashY);
        ctx.fillStyle = '#88ccff';
        ctx.font = '10px "Courier New", monospace';
        ctx.fillText('READY', dashX + 46, dashY);
    }

    // Level badge
    ctx.fillStyle = '#c8a86e';
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.fillText('LV ' + p.level, 12, 96);

    // XP bar
    const xpNeeded = xpToNextLevel(p.level);
    const xpRatio = p.xp / xpNeeded;
    const xpBarX = 58, xpBarY = 88, xpBarW = 60, xpBarH = 6;
    ctx.fillStyle = '#333';
    ctx.fillRect(xpBarX, xpBarY, xpBarW, xpBarH);
    ctx.fillStyle = '#c8a86e';
    ctx.fillRect(xpBarX, xpBarY, xpBarW * xpRatio, xpBarH);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.strokeRect(xpBarX, xpBarY, xpBarW, xpBarH);
    ctx.fillStyle = '#b0a898';
    ctx.font = '10px "Courier New", monospace';
    ctx.fillText(p.xp + '/' + xpNeeded, xpBarX + xpBarW + 6, 96);

    // Combo indicator (3 small slash marks)
    const comboProgress = p.comboStep + (p.atkTimer > 0 ? 1 : 0);
    const comboColors = ['#c8a86e', '#88bbff', '#ff8844'];
    for (let i = 0; i < 3; i++) {
        if (i < comboProgress) {
            ctx.fillStyle = comboColors[i];
        } else if (i === comboProgress && p.comboWindow > 0) {
            // Blink the next mark during combo window
            ctx.fillStyle = Math.sin(performance.now() * 0.015) > 0 ? comboColors[i] : '#555';
        } else {
            ctx.fillStyle = '#333';
        }
        ctx.fillRect(12 + i * 10, 102, 6, 3);
    }
}

// ============================================================
//  LEVEL / XP SYSTEM
// ============================================================
function xpToNextLevel(level) { return XP_BASE + level * XP_PER_LEVEL; }

const POWER_UPS = [
    { name: 'Swift Blade', icon: '\u2694', desc: 'Faster attack speed', unique: false,
      apply(s) { s.atkCooldown = Math.max(0.15, s.atkCooldown - 0.08); } },
    { name: 'Long Reach', icon: '\uD83D\uDDE1', desc: 'Longer sword reach', unique: false,
      apply(s) { s.atkRange += 10; } },
    { name: 'Iron Heart', icon: '\u2665', desc: '+1 max HP, full heal', unique: false,
      apply(s, p) { s.maxHp += 1; p.hp = s.maxHp; } },
    { name: 'Fleet Foot', icon: '\uD83C\uDFC3', desc: 'Move faster', unique: false,
      apply(s) { s.walkSpeed += 0.5; } },
    { name: 'Phantom Dash', icon: '\uD83D\uDC7B', desc: 'Longer, quicker dash', unique: false,
      apply(s) { s.dashDuration += 0.04; s.dashCooldown = Math.max(0.15, s.dashCooldown - 0.1); } },
    { name: 'Heavy Blow', icon: '\uD83D\uDCA5', desc: 'Stronger knockback', unique: false,
      apply(s) { s.knockback += 100; } },
    { name: 'Vampiric Blade', icon: '\uD83E\uDE78', desc: 'Heal 1 HP on kill', unique: true,
      apply(s) { s.lifeSteal = true; } },
    { name: 'Healing Aura', icon: '\u2728', desc: 'Health orbs heal +1', unique: false,
      apply(s) { s.orbHealBonus += 1; } },
];

function pickPowerUps(stats, count) {
    const pool = POWER_UPS.filter(p => !(p.unique && stats.lifeSteal));
    const picks = [];
    const used = new Set();
    while (picks.length < count && picks.length < pool.length) {
        const idx = Math.floor(Math.random() * pool.length);
        if (!used.has(idx)) { used.add(idx); picks.push(pool[idx]); }
    }
    return picks;
}

function drawLevelUpOverlay(choices, hoverIdx) {
    // Dim overlay
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);

    // Title
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#c8a86e';
    ctx.font = 'bold 28px "Courier New", monospace';
    ctx.fillText('LEVEL UP!', VIEW_W / 2, VIEW_H / 2 - 130);

    // Cards
    const cardW = 170, cardH = 180, gap = 16;
    const totalW = choices.length * cardW + (choices.length - 1) * gap;
    const startX = (VIEW_W - totalW) / 2;
    const cardY = VIEW_H / 2 - 80;

    for (let i = 0; i < choices.length; i++) {
        const pu = choices[i];
        const cx = startX + i * (cardW + gap);
        const hover = i === hoverIdx;

        // Card bg
        ctx.fillStyle = hover ? 'rgba(40,30,20,0.95)' : 'rgba(30,20,14,0.92)';
        ctx.strokeStyle = hover ? '#ffe090' : '#c8a86e';
        ctx.lineWidth = hover ? 3 : 2;
        ctx.beginPath();
        ctx.roundRect(cx, cardY, cardW, cardH, 8);
        ctx.fill();
        ctx.stroke();

        // Icon
        ctx.font = '32px serif';
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.fillText(pu.icon, cx + cardW / 2, cardY + 44);

        // Name
        ctx.font = 'bold 13px "Courier New", monospace';
        ctx.fillStyle = '#c8a86e';
        ctx.fillText(pu.name, cx + cardW / 2, cardY + 80);

        // Description (word wrap)
        ctx.font = '11px "Courier New", monospace';
        ctx.fillStyle = '#b0a898';
        const words = pu.desc.split(' ');
        let line = '', ly = cardY + 104;
        for (const word of words) {
            const test = line ? line + ' ' + word : word;
            if (ctx.measureText(test).width > cardW - 20) {
                ctx.fillText(line, cx + cardW / 2, ly);
                line = word;
                ly += 14;
            } else {
                line = test;
            }
        }
        if (line) ctx.fillText(line, cx + cardW / 2, ly);

        // Number hint
        ctx.font = 'bold 14px "Courier New", monospace';
        ctx.fillStyle = hover ? '#ffe090' : '#887766';
        ctx.fillText((i + 1).toString(), cx + cardW / 2, cardY + cardH - 14);
    }

    // Instruction
    ctx.font = '12px "Courier New", monospace';
    ctx.fillStyle = '#887766';
    ctx.fillText('Press 1, 2, 3 or click to choose', VIEW_W / 2, cardY + cardH + 30);

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

function getLevelUpHoverIdx(choices) {
    const cardW = 170, cardH = 180, gap = 16;
    const totalW = choices.length * cardW + (choices.length - 1) * gap;
    const startX = (VIEW_W - totalW) / 2;
    const cardY = VIEW_H / 2 - 80;
    for (let i = 0; i < choices.length; i++) {
        const cx = startX + i * (cardW + gap);
        if (mouseX >= cx && mouseX <= cx + cardW && mouseY >= cardY && mouseY <= cardY + cardH) {
            return i;
        }
    }
    return -1;
}

// ============================================================
//  MAIN
// ============================================================
async function main() {
    // Loading screen
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, VIEW_W, VIEW_H);
    ctx.fillStyle = '#c8a86e';
    ctx.font = '18px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Loading assets...', VIEW_W / 2, VIEW_H / 2);
    ctx.textAlign = 'left';

    await loadAssets();
    buildWorld();

    // Player starts on the path crossing
    const player = new Character('player', 15, 11);
    player.atkTimer = 0;
    player.atkCooldown = 0;
    player.atkHit = false;
    player.hp = PLAYER_MAX_HP;
    player.hitInvuln = 0;
    player.knockVx = 0;
    player.knockVy = 0;
    player.dashTimer = 0;
    player.dashCooldown = 0;
    player.dashDx = 0;
    player.dashDy = 0;
    player.dashing = false;
    player.afterimages = [];
    player.xp = 0;
    player.level = 1;
    player.stats = {
        walkSpeed: WALK_SPEED,
        atkDuration: ATK_DURATION,
        atkCooldown: ATK_COOLDOWN,
        atkRange: ATK_RANGE,
        knockback: KNOCKBACK,
        dashSpeed: DASH_SPEED,
        dashDuration: DASH_DURATION,
        dashCooldown: DASH_COOLDOWN,
        maxHp: PLAYER_MAX_HP,
        orbHealBonus: 0,
        lifeSteal: false,
        comboDmgBonus: 0,
    };
    player.comboStep = 0;
    player.comboWindow = 0;
    let levelUpActive = false;
    let levelUpChoices = [];

    function addXp(amount) {
        player.xp += amount;
        const needed = xpToNextLevel(player.level);
        if (player.xp >= needed) {
            player.xp -= needed;
            player.level++;
            levelUpActive = true;
            levelUpChoices = pickPowerUps(player.stats, 3);
            playLevelUpSound();
        }
    }

    let gameOver = false;

    // Hostile enemies scattered around the map
    function spawnEnemy(sprite, tx, ty, opts = {}) {
        const e = new NPC(sprite, tx, ty, opts.dialogue || '...');
        e.hostile = true;
        e.maxHp = opts.hp || NPC_MAX_HP;
        e.hp = e.maxHp;
        e.speed = opts.speed || 1.0;
        if (opts.ranged) { e.ranged = true; e.projType = opts.projType || 'magic'; }
        if (opts.aggroRange) e.aggroRange = opts.aggroRange;
        return e;
    }

    const npcs = [
        // Wildlings
        spawnEnemy('goblin',     5, 10, { hp: 2, speed: 1.4 }),
        spawnEnemy('goblin',    25,  7, { hp: 2, speed: 1.4 }),
        spawnEnemy('orc',       24, 14, { hp: 4, speed: 0.9 }),
        spawnEnemy('orc',        3, 15, { hp: 4, speed: 0.9 }),
        // Undead
        spawnEnemy('skeleton',  12, 19, { hp: 3 }),
        spawnEnemy('skeleton',  20,  4, { hp: 3 }),
        spawnEnemy('lich',      17, 10, { hp: 2, ranged: true, projType: 'magic', aggroRange: 7 * TILE }),
        // Bog Dwellers
        spawnEnemy('slime',      9, 14, { hp: 2, speed: 0.7 }),
        spawnEnemy('lizardfolk', 22, 19, { hp: 3, speed: 1.1 }),
        spawnEnemy('slime',     14,  5, { hp: 2, speed: 0.7 }),
    ];

    // Snap camera to player initially
    cam.x = player.x + FW / 2 - VIEW_W / 2;
    cam.y = player.y + FH / 2 - VIEW_H / 2;

    let lastTime = performance.now();

    function loop(now) {
        const dt = Math.min((now - lastTime) / 1000, 0.05);
        lastTime = now;

        // ---- Hit freeze (hitstop) ----
        if (freezeTimer > 0) {
            freezeTimer -= dt;
            // Still render during freeze, just don't update
            renderGround();
            drawShadow(player);
            for (const npc of npcs) drawShadow(npc);
            drawAfterimages(player);
            renderScene(player, npcs);
            drawSwordSlash(player);
            for (const npc of npcs) { drawNpcSlash(npc); drawNpcCharge(npc); }
            drawProjectiles();
            drawParticles();
            drawHealthOrbs();
            for (const npc of npcs) { drawAggroMark(npc); drawNpcHpBar(npc); }
            drawHUD(player);
            drawDlg();
            requestAnimationFrame(loop);
            return;
        }

        // ---- Level Up overlay ----
        if (levelUpActive) {
            renderGround();
            drawShadow(player);
            for (const npc of npcs) drawShadow(npc);
            drawAfterimages(player);
            renderScene(player, npcs);
            drawSwordSlash(player);
            for (const npc of npcs) { drawNpcSlash(npc); drawNpcCharge(npc); }
            drawProjectiles();
            drawParticles();
            drawHealthOrbs();
            for (const npc of npcs) { drawAggroMark(npc); drawNpcHpBar(npc); }
            drawHUD(player);
            drawDlg();

            const hoverIdx = getLevelUpHoverIdx(levelUpChoices);
            drawLevelUpOverlay(levelUpChoices, hoverIdx);

            // Keyboard selection
            let sel = -1;
            if (keys['Digit1']) { sel = 0; keys['Digit1'] = false; }
            if (keys['Digit2']) { sel = 1; keys['Digit2'] = false; }
            if (keys['Digit3']) { sel = 2; keys['Digit3'] = false; }
            // Mouse click selection
            if (mouseClicked && hoverIdx >= 0) { sel = hoverIdx; }
            mouseClicked = false;

            if (sel >= 0 && sel < levelUpChoices.length) {
                const pu = levelUpChoices[sel];
                pu.apply(player.stats, player);
                levelUpActive = false;
                spawnParticles(player.x + FW / 2, player.y + FH / 2, '#ffee44', 20);
                spawnParticles(player.x + FW / 2, player.y + FH / 2, '#ffffff', 10);
                showDlg(pu.name + ' acquired!');
            }

            requestAnimationFrame(loop);
            return;
        }

        // ---- Game Over ----
        if (gameOver) {
            if (keys['KeyR']) {
                keys['KeyR'] = false;
                gameOver = false;
                player.xp = 0;
                player.level = 1;
                player.stats = {
                    walkSpeed: WALK_SPEED,
                    atkDuration: ATK_DURATION,
                    atkCooldown: ATK_COOLDOWN,
                    atkRange: ATK_RANGE,
                    knockback: KNOCKBACK,
                    dashSpeed: DASH_SPEED,
                    dashDuration: DASH_DURATION,
                    dashCooldown: DASH_COOLDOWN,
                    maxHp: PLAYER_MAX_HP,
                    orbHealBonus: 0,
                    lifeSteal: false,
                    comboDmgBonus: 0,
                };
                levelUpActive = false;
                levelUpChoices = [];
                player.hp = player.stats.maxHp;
                player.hitInvuln = 0;
                player.knockVx = 0;
                player.knockVy = 0;
                player.x = 15 * TILE;
                player.y = 11 * TILE;
                player.atkTimer = 0;
                player.atkCooldown = 0;
                player.comboStep = 0;
                player.comboWindow = 0;
                player.dashTimer = 0;
                player.dashCooldown = 0;
                player.dashing = false;
                player.afterimages = [];
                projectiles.length = 0;
                healthOrbs.length = 0;
                for (const npc of npcs) {
                    npc.aggro = false;
                    npc.alive = true;
                    npc.hp = npc.maxHp;
                    npc.x = npc.homeX;
                    npc.y = npc.homeY;
                    npc.atkTimer = 0;
                    npc.atkCooldown = 0;
                    npc.rangedCooldown = 0;
                    npc.fireQueued = false;
                    npc.knockVx = 0;
                    npc.knockVy = 0;
                    npc.moving = false;
                    npc.wTimer = 1 + Math.random() * 2;
                }
            }
            renderGround();
            drawShadow(player);
            for (const npc of npcs) drawShadow(npc);
            renderScene(player, npcs);
            drawHUD(player);
            drawGameOver();
            requestAnimationFrame(loop);
            return;
        }

        mouseClicked = false; // consume stale clicks outside level-up

        // ---- Player hit reaction ----
        if (player.hitInvuln > 0) player.hitInvuln -= dt;
        if (Math.abs(player.knockVx) > 1 || Math.abs(player.knockVy) > 1) {
            const bw = 20, bh = 14;
            const nx = player.x + player.knockVx * dt;
            const ny = player.y + player.knockVy * dt;
            if (!blocked(nx + (FW - bw) / 2, ny + FH - bh, bw, bh)) {
                player.x = nx;
                player.y = ny;
            } else {
                player.knockVx *= -0.3;
                player.knockVy *= -0.3;
            }
            player.knockVx *= 0.90;
            player.knockVy *= 0.90;
        }

        // ---- Input ----
        let dx = 0, dy = 0;
        if (keys['ArrowLeft']  || keys['KeyA']) dx -= 1;
        if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
        if (keys['ArrowUp']    || keys['KeyW']) dy -= 1;
        if (keys['ArrowDown']  || keys['KeyS']) dy += 1;
        if (dx && dy) { dx *= 0.707; dy *= 0.707; }

        // Lock movement during knockback
        if (Math.abs(player.knockVx) > 5 || Math.abs(player.knockVy) > 5) {
            dx = 0; dy = 0;
        }

        // ---- Dash ----
        if (player.dashCooldown > 0) player.dashCooldown -= dt;

        // Fade afterimages
        for (let i = player.afterimages.length - 1; i >= 0; i--) {
            player.afterimages[i].alpha -= dt * 4;
            if (player.afterimages[i].alpha <= 0) player.afterimages.splice(i, 1);
        }

        if (player.dashTimer > 0) {
            // Currently dashing
            player.dashTimer -= dt;
            player.dashing = true;

            // Move at dash speed
            const bw = 20, bh = 14;
            const nx = player.x + player.dashDx * player.stats.dashSpeed;
            const ny = player.y + player.dashDy * player.stats.dashSpeed;
            if (!blocked(nx + (FW - bw) / 2, ny + FH - bh, bw, bh)) {
                player.x = nx;
                player.y = ny;
            }

            // Spawn afterimage every other frame
            if (Math.floor(player.dashTimer * 60) % 2 === 0) {
                player.afterimages.push({
                    x: player.x, y: player.y,
                    dir: player.dir, frame: player.frame,
                    alpha: 0.6
                });
            }

            // Spawn dash dust
            if (Math.random() < 0.5) {
                spawnParticles(
                    player.x + FW / 2 - player.dashDx * 10,
                    player.y + FH - 4,
                    'rgba(200,200,255,0.8)', 1
                );
            }

            if (player.dashTimer <= 0) {
                player.dashing = false;
                player.dashCooldown = player.stats.dashCooldown;
            }

            player.moving = true;
            player.update(dt);
        } else {
            player.dashing = false;

            // Start dash
            if ((keys['ShiftLeft'] || keys['ShiftRight']) && player.dashCooldown <= 0
                && player.atkTimer <= 0
                && !(Math.abs(player.knockVx) > 5 || Math.abs(player.knockVy) > 5)) {
                keys['ShiftLeft'] = false;
                keys['ShiftRight'] = false;
                // Dash in movement direction, or facing direction if standing
                let ddx = dx, ddy = dy;
                if (ddx === 0 && ddy === 0) {
                    ddx = DIR_DX[player.dir];
                    ddy = DIR_DY[player.dir];
                }
                const len = Math.hypot(ddx, ddy);
                if (len > 0) {
                    player.dashDx = ddx / len;
                    player.dashDy = ddy / len;
                    player.dashTimer = player.stats.dashDuration;
                    player.dashing = true;
                    // Initial afterimage
                    player.afterimages.push({
                        x: player.x, y: player.y,
                        dir: player.dir, frame: player.frame,
                        alpha: 0.7
                    });
                    spawnParticles(player.x + FW / 2, player.y + FH - 4, '#aabbff', 5);
                }
                dx = 0; dy = 0;
            }

            // ---- Attack (Combo Chain) ----
            if (keys['Mouse0']) {
                keys['Mouse0'] = false;
                if (player.atkCooldown <= 0 && player.atkTimer <= 0) {
                    if (player.comboWindow > 0 && player.comboStep < 2) {
                        player.comboStep++;
                    } else {
                        player.comboStep = 0;
                    }
                    const step = COMBO_STEPS[player.comboStep];
                    player.atkTimer = player.stats.atkDuration * step.durMul;
                    player.atkCooldown = player.stats.atkCooldown * step.cdMul;
                    player.atkHit = false;
                    player.comboWindow = 0;
                }
            }

            // Lock movement during attack
            if (player.atkTimer > 0) {
                dx = 0; dy = 0;
            }

            player.speed = player.stats.walkSpeed;
            player.moving = dx !== 0 || dy !== 0;
            if (player.moving) player.tryMove(dx, dy);
            player.update(dt);
        }

        // Attack update + hit detection
        if (player.atkTimer > 0) {
            const prevTimer = player.atkTimer;
            player.atkTimer -= dt;

            const step = COMBO_STEPS[player.comboStep];
            const stepDur = player.stats.atkDuration * step.durMul;
            const isFinisher = player.comboStep === 2;

            // Hit detection (at halfway through the swing)
            if (player.atkTimer < stepDur * 0.5) {
                // Finisher can multi-hit, others are single-hit
                if (!player.atkHit || isFinisher) {
                    const aDx = DIR_DX[player.dir];
                    const aDy = DIR_DY[player.dir];
                    const hitX = player.x + FW / 2 + aDx * player.stats.atkRange;
                    const hitY = player.y + FH * 0.45 + aDy * player.stats.atkRange;
                    const hitRadius = isFinisher ? TILE * 1.6 : TILE * 1.3;

                    for (const npc of npcs) {
                        if (npc.hitInvuln > 0) continue;
                        const ncx = npc.x + FW / 2;
                        const ncy = npc.y + FH / 2;
                        if (Math.hypot(hitX - ncx, hitY - ncy) < hitRadius) {
                            npc.hitTimer = 0.3;
                            npc.hitInvuln = 0.8;
                            npc.hp -= step.dmg;
                            npc.aggro = true;
                            if (npc.hp <= 0) {
                                const xpAmt = npc.ranged ? 3 : (npc.maxHp >= 4 ? 3 : 2);
                                addXp(xpAmt);
                                if (player.stats.lifeSteal && player.hp < player.stats.maxHp) {
                                    player.hp = Math.min(player.hp + 1, player.stats.maxHp);
                                    spawnParticles(player.x + FW / 2, player.y + FH / 2, '#ff4488', 6);
                                }
                            }
                            const pushA = Math.atan2(ncy - (player.y + FH / 2), ncx - (player.x + FW / 2));
                            npc.knockVx = Math.cos(pushA) * player.stats.knockback * step.knockMul;
                            npc.knockVy = Math.sin(pushA) * player.stats.knockback * step.knockMul;
                            if (!isFinisher) player.atkHit = true;

                            spawnParticles(ncx, ncy, '#ffdd44', 10);
                            spawnParticles(ncx, ncy, '#ffffff', 5);
                            if (isFinisher) {
                                // Extra impact for finisher
                                spawnParticles(ncx, ncy, '#ff8833', 12);
                                shakeTimer = 0.2;
                                shakeIntensity = 8;
                            } else {
                                shakeTimer = 0.15;
                                shakeIntensity = 5;
                            }
                            freezeTimer = HIT_FREEZE;

                            // Nearby NPCs also aggro
                            for (const other of npcs) {
                                if (other !== npc && other.alive && !other.aggro) {
                                    if (Math.hypot(other.x - npc.x, other.y - npc.y) < 5 * TILE) {
                                        other.aggro = true;
                                    }
                                }
                            }

                            const reactions = npc.hp > 0
                                ? ['Grraaah!', 'You dare?!', 'Crush you!', 'No escape!']
                                : ['Urgh...!', '*crumbles*', '...defeated...'];
                            showDlg(reactions[Math.floor(Math.random() * reactions.length)]);
                            if (!isFinisher) break;
                        }
                    }
                    if (isFinisher) player.atkHit = true;
                }
            }

            // When attack ends, open combo window (unless finisher)
            if (prevTimer > 0 && player.atkTimer <= 0 && player.comboStep < 2) {
                player.comboWindow = COMBO_WINDOW;
            }
        }
        if (player.atkCooldown > 0) player.atkCooldown -= dt;

        // Combo window countdown
        if (player.comboWindow > 0) {
            player.comboWindow -= dt;
            if (player.comboWindow <= 0) player.comboStep = 0;
        }

        // ---- Interact ----
        if (keys['Space']) {
            keys['Space'] = false;
            for (const npc of npcs) {
                if (Math.hypot(npc.x - player.x, npc.y - player.y) < TILE * 2) {
                    showDlg(npc.dialogue);
                    // Face NPC toward player
                    if (Math.abs(player.x - npc.x) > Math.abs(player.y - npc.y))
                        npc.dir = player.x < npc.x ? 'left' : 'right';
                    else
                        npc.dir = player.y < npc.y ? 'up' : 'down';
                    break;
                }
            }
        }

        // ---- Update NPCs ----
        for (const npc of npcs) npc.update(dt, player);

        // ---- Projectiles ----
        if (updateProjectiles(dt, player, npcs, (npc) => {
            const xpAmt = npc.ranged && npc.projType === 'magic' ? 3 : 2;
            addXp(xpAmt);
            if (player.stats.lifeSteal && player.hp < player.stats.maxHp) {
                player.hp = Math.min(player.hp + 1, player.stats.maxHp);
                spawnParticles(player.x + FW / 2, player.y + FH / 2, '#ff4488', 6);
            }
        })) {
            gameOver = true;
            showDlg('');
        }

        // ---- NPC attacks hit player ----
        if (player.hitInvuln <= 0 && !player.dashing) {
            for (const npc of npcs) {
                if (!npc.alive || !npc.aggro || npc.atkTimer <= 0) continue;
                if (npc.atkTimer < NPC_ATK_DURATION * 0.4 && !npc.atkHit) {
                    const aDx = DIR_DX[npc.dir];
                    const aDy = DIR_DY[npc.dir];
                    const hx = npc.x + FW / 2 + aDx * NPC_ATK_RANGE;
                    const hy = npc.y + FH * 0.45 + aDy * NPC_ATK_RANGE;
                    const pcx = player.x + FW / 2;
                    const pcy = player.y + FH / 2;
                    if (Math.hypot(hx - pcx, hy - pcy) < TILE * 1.3) {
                        npc.atkHit = true;
                        player.hp--;
                        player.hitInvuln = 1.0;
                        const pushA = Math.atan2(pcy - (npc.y + FH / 2), pcx - (npc.x + FW / 2));
                        player.knockVx = Math.cos(pushA) * KNOCKBACK * 0.8;
                        player.knockVy = Math.sin(pushA) * KNOCKBACK * 0.8;
                        spawnParticles(pcx, pcy, '#ff4444', 10);
                        spawnParticles(pcx, pcy, '#ffffff', 5);
                        shakeTimer = 0.18;
                        shakeIntensity = 6;
                        freezeTimer = HIT_FREEZE;
                        if (player.hp <= 0) {
                            gameOver = true;
                            showDlg('');
                        }
                    }
                }
            }
        }

        // ---- Camera ----
        updateCam(player);

        // ---- Dialogue timer ----
        if (dlgTimer > 0) dlgTimer -= dt;

        // ---- Particles ----
        updateParticles(dt);

        // ---- Health orbs ----
        updateHealthOrbs(dt, player);

        // ---- Screen shake ----
        const savedCX = cam.x, savedCY = cam.y;
        if (shakeTimer > 0) {
            shakeTimer -= dt;
            cam.x += (Math.random() - 0.5) * shakeIntensity * 2;
            cam.y += (Math.random() - 0.5) * shakeIntensity * 2;
        }

        // ---- Render ----
        renderGround();

        // Draw shadows under all characters
        drawShadow(player);
        for (const npc of npcs) drawShadow(npc);

        drawAfterimages(player);
        renderScene(player, npcs);
        drawSwordSlash(player);
        for (const npc of npcs) { drawNpcSlash(npc); drawNpcCharge(npc); }
        drawProjectiles();
        drawParticles();
        drawHealthOrbs();
        for (const npc of npcs) { drawAggroMark(npc); drawNpcHpBar(npc); }
        drawHUD(player);
        drawDlg();

        // Restore camera after shake
        cam.x = savedCX;
        cam.y = savedCY;

        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
}

main();
</script>
